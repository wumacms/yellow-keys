<!-- 6. 名师专访/故事 (采用案例区块风格，展示老师与学生的互动) -->
<section class="bg-zinc-950 py-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-4xl font-black text-yellow-300">名师 · 育人故事</h2>
            <p class="text-gray-400 text-lg mt-2">听听导师们的教学理念与学员成长</p>
        </div>
        <div class="grid md:grid-cols-3 gap-6">
            <!-- 故事1 类似案例卡片，但展示老师观点 -->
            <div class="bg-black p-6 rounded-3xl border border-yellow-300/20">
                <div class="flex items-center gap-3 mb-4">
                    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=96&h=96&fit=crop"
                        class="w-12 h-12 rounded-full object-cover" alt="张奕">
                    <div>
                        <h3 class="font-bold text-white">张奕 · 钢琴</h3>
                        <p class="text-xs text-yellow-300">"音乐是情感的语言"</p>
                    </div>
                </div>
                <p class="text-gray-300 italic text-sm">"我有个学生刚来时特别内向，通过即兴演奏慢慢打开自己，现在能自信地在音乐厅独奏。每个孩子都有自己的音乐密码。"</p>
            </div>
            <!-- 故事2 -->
            <div class="bg-black p-6 rounded-3xl border border-yellow-300/20">
                <div class="flex items-center gap-3 mb-4">
                    <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?w=96&h=96&fit=crop"
                        class="w-12 h-12 rounded-full object-cover" alt="林清">
                    <div>
                        <h3 class="font-bold text-white">林清 · 声乐</h3>
                        <p class="text-xs text-yellow-300">"流行演唱不只有技巧"</p>
                    </div>
                </div>
                <p class="text-gray-300 italic text-sm">"教过最年长的学生62岁，退休后开始学唱歌，现在在社区合唱团担任领唱。唱歌是每个人都拥有的权利。"</p>
            </div>
            <!-- 故事3 -->
            <div class="bg-black p-6 rounded-3xl border border-yellow-300/20">
                <div class="flex items-center gap-3 mb-4">
                    <img src="https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=96&h=96&fit=crop"
                        class="w-12 h-12 rounded-full object-cover" alt="陈曦">
                    <div>
                        <h3 class="font-bold text-white">陈曦 · 小提琴</h3>
                        <p class="text-xs text-yellow-300">"乐团思维培养合作"</p>
                    </div>
                </div>
                <p class="text-gray-300 italic text-sm">"我的学生组了一个弦乐四重奏，去年获得上海国际青少年室内乐比赛一等奖。看到他们享受合奏，比拿奖更开心。"</p>
            </div>
        </div>
    </div>
</section>
