<!-- 6. 校区常见问题 (FAQ) 沿用之前风格 -->
<section class="bg-zinc-950 py-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <h2 class="text-3xl font-black text-center text-yellow-300 mb-10">校区 · 常见问题</h2>
        <div class="space-y-4">
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">不同校区的课程和收费一样吗？</h3>
                <p class="text-gray-400 mt-1">课程体系、师资标准、收费全国统一。但部分校区因场地成本可能有微小浮动，具体以校区报价为准。</p>
            </div>
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">可以跨校区上课吗？</h3>
                <p class="text-gray-400 mt-1">可以。学员可在全国任意校区预约练琴或补课（需提前联系教务协调）。长期跨城可办理校区转移。</p>
            </div>
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">校区附近有停车场吗？</h3>
                <p class="text-gray-400 mt-1">每个校区均临近地铁站，并配有停车位/合作停车场，详情可查看具体校区路线说明。</p>
            </div>
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">新校区筹备期间可以报名吗？</h3>
                <p class="text-gray-400 mt-1">可以。提前报名可享早鸟优惠，且可选择就近已开放校区上课，新校区开放后转回。</p>
            </div>
        </div>
    </div>
</section>
