<!-- 6. 活动FAQ (快速解答参与活动的常见问题) 沿用原faq样式 -->
<section class="bg-zinc-950 py-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <h2 class="text-3xl font-black text-center text-yellow-300 mb-10">关于活动 · 常见问题</h2>
        <div class="space-y-4">
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">学员如何报名参加演出？</h3>
                <p class="text-gray-400 mt-1">任课老师会提前1-2个月在班级群发布招募通知，填写报名表并提交演奏视频进行审核即可。</p>
            </div>
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">非学员可以观摩活动吗？</h3>
                <p class="text-gray-400 mt-1">绝大部分活动对外开放，但部分大师课旁听席位有限，需提前预约。公益演出免预约入场。</p>
            </div>
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">活动会收取费用吗？</h3>
                <p class="text-gray-400 mt-1">学员汇报音乐会、开放日等免费；大师课、音乐节等视情况收取少量成本费或划扣课时，具体见活动详情。</p>
            </div>
            <div class="border border-yellow-300/30 rounded-2xl p-5">
                <h3 class="font-bold text-white text-lg">如何获取最新活动提醒？</h3>
                <p class="text-gray-400 mt-1">关注公众号"黄黑键音乐学校"或添加校区教务微信，每周推送活动日历。</p>
            </div>
        </div>
    </div>
</section>
